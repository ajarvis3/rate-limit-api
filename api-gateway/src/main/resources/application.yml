spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      routes:
        - id: hello-api #Fill in real names when they're determined
          uri: http://hello-api:8080
          predicates:
            - Path=/api/hello/**
        - id: usage-service
          uri: http://usage-service:8080
          predicates:
            - Path=/usage/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/ratelimit
          jwk-set-uri: http://keycloak:8080/realms/ratelimit/protocol/openid-connect/certs

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.springframework.cloud.gateway: DEBUG
    com.ratelimit.apigateway.filter: DEBUG

server:
  port: 8080

