spring:
  application:
    name: api-gateway
  data:
    redis:
      host: redis
      port: 6379
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: hello-api
              uri: http://hello-api:8080
              predicates:
                - Path=/api/hello/**
            - id: usage-service
              uri: http://usage-service:8083
              predicates:
                - Path=/usage/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/ratelimit
          jwk-set-uri: http://keycloak:8080/realms/ratelimit/protocol/openid-connect/certs

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    com.ratelimit.apigateway.filter: DEBUG
    com.ratelimit.apigateway.service: DEBUG
    com.ratelimit.apigateway.config: DEBUG
    org.springframework.cloud.gateway: TRACE
    reactor.netty: DEBUG
server:
  port: 8080

