spring:
  application:
    name: billing-service
  datasource:
    url: jdbc:mysql://mysql:3306/billing_db
    username: billing_user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    database-platform: org.hibernate.dialect.MySQLDialect
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: billing-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
    properties:
      spring.json.trusted.packages: com.ratelimit.billing.kafka,com.ratelimit.usage.kafka,com.ratelimit.usage.dto,com.ratelimit.subscription.dto
      spring.json.value.default.type: com.ratelimit.subscription.dto.SubscriptionBillingDTO
      spring.json.use.type.headers: false

server:
  port: 8084

# Provide Jakarta Persistence properties at the top level so Hibernate (standalone) can
# pick them up via the environment name `jakarta.persistence.jdbc.url`.
jakarta:
  persistence:
    jdbc:
      url: jdbc:mysql://mysql:3306/billing_db
      user: billing_user
      password: password
