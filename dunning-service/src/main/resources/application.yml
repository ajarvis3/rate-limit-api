spring:
  application:
    name: dunning-service
  datasource:
    # When running in Kubernetes, the MySQL service is available at 'mysql'
    url: jdbc:mysql://mysql:3306/dunning_db
    username: dunning_user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: dunning-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ratelimit.dunning.dto"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8085

# Provide Jakarta Persistence properties at the top level so Hibernate can pick them up
jakarta:
  persistence:
    jdbc:
      url: jdbc:mysql://mysql:3306/dunning_db
      user: dunning_user
      password: password

