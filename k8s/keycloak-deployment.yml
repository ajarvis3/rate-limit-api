# Kubernetes manifests for all microservices in this repository
# Creates a namespace `ratelimit` and Deployments + Services (ClusterIP) for each microservice

apiVersion: v1
kind: Namespace
metadata:
  name: ratelimit

---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
  namespace: ratelimit
type: Opaque
stringData:
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: password

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: ratelimit
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:21.1.1
          args: ["start-dev","--http-enabled=true","--http-port=8080"]
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: ratelimit
spec:
  selector:
    app: keycloak
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
