# Kubernetes manifests for all microservices in this repository
# Creates a namespace `ratelimit` and Deployments + Services (ClusterIP) for each microservice

apiVersion: v1
kind: Namespace
metadata:
  name: ratelimit

---
# Common label selector template: app: <service-name>

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ratelimit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ratelimit/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ratelimit
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP

