# Kubernetes manifests for all microservices in this repository
# Creates a namespace `ratelimit` and Deployments + Services (ClusterIP) for each microservice

apiVersion: v1
kind: Namespace
metadata:
  name: ratelimit

---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: ratelimit
type: Opaque
stringData:
  mysql-root-password: "password"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-initdb-config
  namespace: ratelimit
data:
  01-init.sql: |
    CREATE DATABASE IF NOT EXISTS billing_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE USER IF NOT EXISTS 'billing_user'@'%' IDENTIFIED BY 'password';
    GRANT ALL PRIVILEGES ON billing_db.* TO 'billing_user'@'%';
    
    CREATE DATABASE IF NOT EXISTS dunning_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE USER IF NOT EXISTS 'dunning_user'@'%' IDENTIFIED BY 'password';
    GRANT ALL PRIVILEGES ON dunning_db.* TO 'dunning_user'@'%';
    
    CREATE DATABASE IF NOT EXISTS subscription_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE USER IF NOT EXISTS 'subscription_user'@'%' IDENTIFIED BY 'password';
    GRANT ALL PRIVILEGES ON subscription_db.* TO 'subscription_user'@'%';
    
    CREATE DATABASE IF NOT EXISTS usage_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE USER IF NOT EXISTS 'usage_user'@'%' IDENTIFIED BY 'password';
    GRANT ALL PRIVILEGES ON usage_db.* TO 'usage_user'@'%';
    
    CREATE DATABASE IF NOT EXISTS user_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE USER IF NOT EXISTS 'user_user'@'%' IDENTIFIED BY 'password';
    GRANT ALL PRIVILEGES ON user_db.* TO 'user_user'@'%';

    FLUSH PRIVILEGES;

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: ratelimit
  labels:
    app: mysql
spec:
  ports:
    - port: 3306
      name: mysql
  selector:
    app: mysql

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: ratelimit
spec:
  serviceName: "mysql"
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: initdb-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: initdb-scripts
          configMap:
            name: mysql-initdb-config
            defaultMode: 0775
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 5Gi