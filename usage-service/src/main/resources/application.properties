spring.application.name=usage-service

# Minimal local/dev datasource (H2 in-memory) - tests and local runs can use this
spring.datasource.url=jdbc:h2:mem:usage;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Redis (adjust host/port as needed for local environment)
spring.redis.host=localhost
spring.redis.port=6379

# Logging
logging.level.root=INFO
logging.level.com.ratelimit=DEBUG

